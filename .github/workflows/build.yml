name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      # Create placeholder resource files for CI (real installers are too large for git)
      - name: Create placeholder resources
        shell: bash
        run: |
          mkdir -p src-tauri/resources
          # Create placeholder files if they don't exist (real installers are .gitignored)
          [ -f src-tauri/resources/Obsidian.dmg ] || echo "placeholder" > src-tauri/resources/Obsidian.dmg
          [ -f src-tauri/resources/Obsidian-Setup.exe ] || echo "placeholder" > src-tauri/resources/Obsidian-Setup.exe
          [ -f src-tauri/resources/Obsidian.AppImage ] || echo "placeholder" > src-tauri/resources/Obsidian.AppImage
          [ -f src-tauri/resources/Git-Installer.exe ] || echo "placeholder" > src-tauri/resources/Git-Installer.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'My Brain Is Full Crew ${{ github.ref_name }}'
          releaseBody: |
            Cross-platform release for macOS, Windows, and Linux.

            ## Downloads
            - **macOS (Apple Silicon)**: `.dmg` file
            - **macOS (Intel)**: `.dmg` file
            - **Windows**: `.msi` or `.exe` installer
            - **Linux**: `.deb`, `.rpm`, or `.AppImage`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # Upload build artifacts (available even without a tag)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: ignore
